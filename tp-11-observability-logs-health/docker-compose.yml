version: "3.8"

services:
  api:
    build: ./app
    ports:
      - 8080:5000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # wget --spider just checks if the URL exists (HTTP 200 OK) without downloading the content
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s
