x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  # The ENRICHED API backend
  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/proddb
      - REDIS_URL=redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - AppNet
      - DbNet
    logging: *default-logging

  # The Postgres Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proddb
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - DbNet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d proddb"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # The Redis Cache
  cache:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - cachedata:/data
    networks:
      - DbNet
    logging: *default-logging

  # The ENRICHED Static Frontend
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - AppNet
    logging: *default-logging

  # The Nginx Reverse Proxy (The ONLY public entrypoint)
  proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # For SSL in real prod
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - AppNet
    logging: *default-logging

networks:
  AppNet: # Frontend <-> Proxy <-> API
  DbNet:  # API <-> DB <-> Cache

volumes:
  dbdata:
  cachedata:
