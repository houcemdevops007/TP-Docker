version: "3.8"

services:
  # The unified entrypoint
  proxy:
    image: nginx:1.25.3-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - front-net
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  # Static HTML/JS frontend
  frontend:
    build:
      context: ./frontend
    networks:
      - front-net

  # Python API backend
  backend:
    build:
      context: ./backend
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    networks:
      - front-net
      - back-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: metrics
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - back-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  front-net:
  back-net:

volumes:
  db-data:
